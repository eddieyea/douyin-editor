<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>抖音/小红书 Editor</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --fg:#e8eaed; --mut:#9aa0a6; --acc:#e23744; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 -apple-system,system-ui,"PingFang SC",sans-serif;
         background:var(--bg); color:var(--fg); }
  .wrap { max-width:560px; margin:6vh auto; padding:0 18px; }
  h1 { font-size:22px; margin:0 0 4px; } .sub { color:var(--mut); margin:0 0 22px; }
  .card { background:var(--card); border:1px solid #262a33; border-radius:14px; padding:20px; }
  .drop { border:2px dashed #39404d; border-radius:12px; padding:26px; text-align:center;
          color:var(--mut); cursor:pointer; transition:.15s; }
  .drop.over { border-color:var(--acc); color:var(--fg); }
  .opt { display:flex; align-items:center; justify-content:space-between; padding:9px 0;
         border-top:1px solid #23272f; }
  .opt:first-of-type { border-top:none; margin-top:8px; }
  .opt label { cursor:pointer; } .opt small { color:var(--mut); display:block; }
  input[type=range]{ width:140px; } select{ background:#23272f; color:var(--fg);
         border:1px solid #39404d; border-radius:7px; padding:5px; }
  .switch { position:relative; width:42px; height:24px; }
  .switch input{ display:none; }
  .sl { position:absolute; inset:0; background:#3a3f4b; border-radius:24px; transition:.2s; }
  .sl:before{ content:""; position:absolute; width:18px; height:18px; left:3px; top:3px;
         background:#fff; border-radius:50%; transition:.2s; }
  input:checked + .sl{ background:var(--acc); } input:checked + .sl:before{ transform:translateX(18px); }
  button{ width:100%; margin-top:18px; padding:12px; font-size:16px; font-weight:600;
         color:#fff; background:var(--acc); border:0; border-radius:10px; cursor:pointer; }
  button:disabled{ opacity:.5; cursor:default; }
  .prog { margin-top:18px; display:none; }
  .bar { height:6px; background:#23272f; border-radius:6px; overflow:hidden; }
  .bar > i { display:block; height:100%; width:30%; background:var(--acc);
         animation:slide 1.2s infinite; }
  @keyframes slide { 0%{margin-left:-30%} 100%{margin-left:100%} }
  .msg { color:var(--mut); margin-top:8px; font-size:14px; }
  a.dl { display:none; margin-top:16px; text-align:center; padding:12px; border-radius:10px;
         background:#1f8a4c; color:#fff; text-decoration:none; font-weight:600; }
  .note{ color:var(--mut); font-size:12.5px; margin-top:14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>抖音 / 小红书 视频编辑</h1>
  <p class="sub">Upload a raw clip → trim · grade · captions · restore → download.</p>
  <div class="card">
    <label class="drop" id="drop">
      <input type="file" id="file" accept="video/*" hidden>
      <div id="dropText">Drag a video here, or click to choose</div>
    </label>

    <div class="opt"><label for="trim">Auto-trim dead air<small>cut pauses & the end fiddling</small></label>
      <label class="switch"><input type="checkbox" id="trim" checked><span class="sl"></span></label></div>
    <div class="opt"><label for="subtitle">Captions (字幕)<small>ASR · word swaps · 出🚗</small></label>
      <label class="switch"><input type="checkbox" id="subtitle" checked><span class="sl"></span></label></div>
    <div class="opt"><label for="beauty">美颜 / 瘦脸<small>slimming (skin off when restore on)</small></label>
      <label class="switch"><input type="checkbox" id="beauty"><span class="sl"></span></label></div>
    <div class="opt"><label for="restore">AI restore (clarity)<small>GPU · slower</small></label>
      <label class="switch"><input type="checkbox" id="restore" checked><span class="sl"></span></label></div>
    <div class="opt"><label>Restore intensity <span id="iv">0.35</span><small>0 natural · 1 full</small></label>
      <input type="range" id="intensity" min="0" max="1" step="0.05" value="0.35"></div>
    <div class="opt"><label for="hdr">Smart HDR<small>10-bit HDR10 export</small></label>
      <label class="switch"><input type="checkbox" id="hdr"><span class="sl"></span></label></div>

    <button id="go" disabled>Process video</button>

    <div class="prog" id="prog">
      <div class="bar"><i></i></div>
      <div class="msg" id="msg">Starting…</div>
    </div>
    <a class="dl" id="dl">⬇ Download finished video</a>
    <p class="note">AI restore runs on a GPU and can take a few minutes for a full clip.</p>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
let fileObj = null;
const drop = $('drop'), fileIn = $('file');
drop.onclick = () => fileIn.click();
['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over')}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over')}));
drop.addEventListener('drop', ev => { fileObj = ev.dataTransfer.files[0]; showFile(); });
fileIn.onchange = () => { fileObj = fileIn.files[0]; showFile(); };
function showFile(){ if(fileObj){ $('dropText').textContent = '📹 ' + fileObj.name; $('go').disabled = false; } }
$('intensity').oninput = e => $('iv').textContent = (+e.target.value).toFixed(2);

$('go').onclick = async () => {
  if(!fileObj) return;
  $('go').disabled = true; $('prog').style.display='block'; $('dl').style.display='none';
  const fd = new FormData();
  fd.append('file', fileObj);
  fd.append('trim', $('trim').checked?'1':'0');
  fd.append('subtitle', $('subtitle').checked?'1':'0');
  fd.append('beauty', $('beauty').checked?'1':'0');
  fd.append('restore', $('restore').checked?'1':'0');
  fd.append('restore_intensity', $('intensity').value);
  fd.append('hdr', $('hdr').checked?'1':'0');
  const r = await fetch('/jobs', {method:'POST', body:fd});
  if(!r.ok){ $('msg').textContent='Upload failed'; return; }
  const {job_id} = await r.json();
  poll(job_id);
};

async function poll(id){
  const r = await fetch('/jobs/'+id);
  const j = await r.json();
  $('msg').textContent = j.message || j.status;
  if(j.status === 'done'){
    $('prog').style.display='none';
    const a = $('dl'); a.href = '/jobs/'+id+'/download'; a.style.display='block';
    $('go').disabled = false;
  } else if(j.status === 'error'){
    $('prog').style.display='none'; $('go').disabled=false;
  } else { setTimeout(()=>poll(id), 1500); }
}
</script>
</body>
</html>
